name: Github Pages Deploy

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Install and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependency and build
        run: |
          bun i
          bun run build

      - name: Upload GhPages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site/.vitepress/dist

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: ./site/.vitepress/dist
          retention-days: 1

  deploy-github-pages:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    needs: build
    runs-on: ubuntu-latest
    name: Deploy Github Pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  deploy-edgeone:
    needs: build
    runs-on: ubuntu-latest
    name: Deploy Tencent EdgeOne
    steps:
      - name: Setup Node.js
        uses: oven-sh/setup-bun@v2

      - name: Install EdgeOne CLi
        run:
          bun install -g edgeone

      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: ./dist

      - name: Deploy to EdgeOne Pages
        run: bun x edgeone pages deploy ./dist -n candystore -t ${{ secrets.EDGEONE_API_TOKEN }}
        env:
          EDGEONE_API_TOKEN: ${{ secrets.EDGEONE_API_TOKEN }}

